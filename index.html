<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Image Multiplier</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Prevents scrollbars from appearing */
            background-color: #222; /* Dark background to make the image pop */
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .bouncing-img {
            position: absolute;
            width: 200px; /* Adjust this value to make the images larger or smaller */
            border-radius: 15px; /* Adds nicely rounded corners */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            user-select: none; /* Prevents accidentally highlighting the image */
            transition: transform 0.1s;
        }

        .bouncing-img:active {
            transform: scale(0.9); /* Tiny shrink effect when clicked */
        }
    </style>
</head>
<body>

    <img src="my-image.jpg" class="bouncing-img" id="initial-img" alt="Click me!">

    <script>
        const initialImg = document.getElementById('initial-img');
        let images = []; // Array to track all the images and their physics
        let isMoving = false;

        // Center the initial image on the screen
        window.onload = () => {
            const startX = (window.innerWidth - initialImg.clientWidth) / 2;
            const startY = (window.innerHeight - initialImg.clientHeight) / 2;
            initialImg.style.left = startX + 'px';
            initialImg.style.top = startY + 'px';
        };

        // Function to create a new cloned image
        function spawnImage(x, y) {
            const imgEl = document.createElement('img');
            imgEl.src = initialImg.src; 
            imgEl.className = 'bouncing-img';
            imgEl.style.left = x + 'px';
            imgEl.style.top = y + 'px';
            document.body.appendChild(imgEl);

            // Give it a random speed and direction
            let dx = (Math.random() - 0.5) * 12;
            let dy = (Math.random() - 0.5) * 12;
            
            // Prevent them from moving too slowly
            if (Math.abs(dx) < 3) dx = dx < 0 ? -3 : 3;
            if (Math.abs(dy) < 3) dy = dy < 0 ? -3 : 3;

            const imgData = { el: imgEl, x: x, y: y, dx: dx, dy: dy };
            images.push(imgData);

            // Make the new image clickable too!
            imgEl.addEventListener('click', (e) => {
                e.stopPropagation(); // Prevent triggering other clicks
                multiply(imgData.x, imgData.y);
            });
        }

        // Function to handle the multiplication
        function multiply(x, y) {
            // Spawns 3 new images every time you click one
            for (let i = 0; i < 3; i++) {
                spawnImage(x, y);
            }
        }

        // Click listener for the very first image
        initialImg.addEventListener('click', (e) => {
            const rect = initialImg.getBoundingClientRect();
            
            // Start the original image moving on the first click
            if (!isMoving) {
                let dx = (Math.random() - 0.5) * 12;
                let dy = (Math.random() - 0.5) * 12;
                if (Math.abs(dx) < 3) dx = dx < 0 ? -3 : 3;
                if (Math.abs(dy) < 3) dy = dy < 0 ? -3 : 3;

                images.push({
                    el: initialImg,
                    x: rect.left,
                    y: rect.top,
                    dx: dx,
                    dy: dy
                });
                isMoving = true;
            }
            
            // Multiply!
            multiply(rect.left, rect.top);
        });

        // The animation loop
        function animate() {
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;

            images.forEach(img => {
                // Get the current width and height of this specific image
                const width = img.el.clientWidth;
                const height = img.el.clientHeight;

                // Move the image
                img.x += img.dx;
                img.y += img.dy;

                // Bounce off left/right walls
                if (img.x + width >= screenWidth) {
                    img.x = screenWidth - width; // Snap back inside
                    img.dx *= -1; // Reverse direction
                } else if (img.x <= 0) {
                    img.x = 0;
                    img.dx *= -1;
                }

                // Bounce off top/bottom walls
                if (img.y + height >= screenHeight) {
                    img.y = screenHeight - height;
                    img.dy *= -1;
                } else if (img.y <= 0) {
                    img.y = 0;
                    img.dy *= -1;
                }

                // Update the actual CSS positioning
                img.el.style.left = img.x + 'px';
                img.el.style.top = img.y + 'px';
            });

            // Loop the animation
            requestAnimationFrame(animate);
        }

        // Kick off the animation loop
        animate();
    </script>
</body>
</html>
